<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #bod{
            width: 300px;
            height: 700px;
            border: 2px black solid;
            border-radius: 40%;
            background-color: rgb(7, 7, 7);
        }
        .box{
       width: 100px;
       height: 100px;
       border: 2px black solid;
       margin: 65px;
       padding: 25px;
       background-color: rgb(188, 203, 203);
       align-items: center; 
       border-radius: 50%;   
        }
        #b1:hover{
                background-color: rgb(244, 10, 10);
        }
        #b2:hover{
                background-color: rgb(241, 241, 8);
        }#b3:hover{
                background-color: rgb(8, 249, 12);
        }
    </style>
</head>
<body>
    <div id="bod">
        <div class="box" id="b1"></div>
        <div class="box" id="b2"></div>
        <div class="box" id="b3"></div>
    </div>
</body>
</html>
