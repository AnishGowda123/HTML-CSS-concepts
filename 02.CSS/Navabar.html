<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            color: rgb(134, 190, 238);
        }
        #main{
            height: 50px;
            width: 100%;
            background-color: rgb(99, 99, 96);
        }
        button{
            background-color: chocolate;
        }
        #logo{
            color: rgb(193, 78, 16);
            font-size: 30px;
        }
        a{
            margin-right: 150px;
            font-size: 20px;   
        }
        input{
            margin-left: 150px;
        }
        #pic{
            height: 500px;
            width: 100%;
            background-image: url("https://tse1.mm.bing.net/th/id/OIP.JkYyLTBlYnkE_i5HdWJx0gHaEK?pid=Api&P=0&h=180");
            background-size: cover;
            border: 5px solid rgb(17, 17, 17);
        }
        h1{
            color: black;
        }
    </style>
</head>
<body>
    <div id="main">
        <a id="logo">Amazon</a>
        <a>Home</a>
        <a>Account</a>
        <a>Help</a>
        <a>Cart</a>
        
        <input type="text" placeholder="Enter the requried">
        <button>Search</button>
    </div>
    <div id="pic"></div>
    <footer>
        <h1>Contact us:www.amazon.com</h1>
    </footer>

</body>
</html>
