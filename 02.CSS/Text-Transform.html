<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #head1{
            text-transform: capitalize;
        }
         #head2{
            text-transform: lowercase;
        }
         #head3{
            text-transform: uppercase;
        }
        
    </style>
</head>
<body>
    <h1 id="head1">text transform</h1>
    <h1 id="head2">TEXT TRANSFORM</h1>
    <h1 id="head3">text transform</h1>
    
</body>
</html>
